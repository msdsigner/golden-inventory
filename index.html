<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View the full, real-time product inventory for Golden Opportunity Catalog. Filter and search for items instantly.">
    <title>Golden Opportunity Catalog | Live Inventory</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Local Stylesheet -->
    <link rel="stylesheet" href="style.css">
    
    <!-- PDF & Excel Export Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>
    <!-- Top Navigation -->
    <header>
        <div class="nav-container">
            <h1 class="logo">✨ Golden Opportunity <span>Catalog</span></h1>
            <div class="search-wrap">
                <input type="text" id="searchInput" placeholder="Search by name, ID, or brand...">
            </div>
            <button class="cart-toggle" id="cartBtn">
                View Selection (<span id="cartCount">0</span>)
            </button>
        </div>
    </header>

    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-block">
                <h3>Last Updated</h3>
                <p class="update-note" id="updateDate">Loading date...</p>
                <div class="download-links">
                    <a href="#" id="dlExcel" download class="dl-btn excel" title="Download Excel">Excel</a>
                    <a href="#" id="dlPdf" download class="dl-btn pdf" title="Download PDF">PDF</a>
                </div>
            </div>
            <div class="sidebar-block">
                <h3>Sort Inventory</h3>
                <select id="sortSelect" class="category-dropdown">
                    <option value="default">Sort By: Default</option>
                    <option value="name-asc">Name: A-Z</option>
                    <option value="name-desc">Name: Z-A</option>
                    <option value="price-asc">Price: Low to High</option>
                    <option value="price-desc">Price: High to Low</option>
                    <option value="qty-asc">Quantity: Lowest First</option>
                    <option value="qty-desc">Quantity: Highest First</option>
                    <option value="newest">Newest</option>
                </select>
            </div>

            <div class="sidebar-block">
                <h3>Browse by Category</h3>
                <!-- Dropdown version -->
                <select id="categoryDropdown" class="category-dropdown">
                    <!-- Populated by JS -->
                </select>
                
                <!-- 3-Column Buttons version -->
                <div class="category-grid" id="categoryGrid">
                    <!-- Populated by JS -->
                </div>
            </div>
            
            <p id="totalCount" class="total-count">Loading items...</p>
        </aside>

        <!-- Main Content -->
        <main class="content-area">
            <!-- Inventory Grid -->
            <div id="inventoryGrid" class="inventory-grid">
                <!-- Cards injected by JS -->
            </div>
            
            <!-- Empty State -->
            <div id="emptyState" class="empty-state hidden">
                <p>No products found matching your criteria.</p>
            </div>
        </main>
    </div>

    <!-- Slide-out Cart Panel -->
    <div id="cartPanel" class="cart-panel">
        <div class="cart-header">
            <h2>Your Selection</h2>
            <button class="close-cart" id="closeCartBtn">&times;</button>
        </div>
        <div class="cart-body" id="cartContent">
            <!-- Selected items listed here -->
        </div>
        <div class="cart-grand-total" id="cartGrandTotal" style="padding: 15px 20px; border-top: 2px solid #EEE; text-align: right; font-size: 1.2rem; font-weight: bold; color: #1e3c72; background: #fff;">
            Grand Total: $0.00
        </div>
        <div class="cart-footer" id="cartActions">
            <button class="action-btn" id="copyCart" style="background: #6366f1; margin-bottom: 5px;">📋 Copy Selection for Email</button>
            <button class="action-btn email" id="emailCartDefault">📧 Email (App Link)</button>
            <button class="action-btn email-gmail" id="emailCartGmail" style="background: #ea4335;">🌐 Email (Gmail)</button>
            <button class="action-btn pdf" id="pdfCart">📄 Save as PDF</button>
            <button class="action-btn excel" id="excelCart">📊 Save as Excel</button>
        </div>
    </div>
    
    <!-- Cart Overlay -->
    <div id="cartOverlay" class="cart-overlay"></div>

    <!-- Local Script -->
    <script src="script.js?v=2026.4.15"></script>
</body>
</html>
